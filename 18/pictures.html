<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Website - Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #ff4e9b);
    text-align: center;
    padding: 50px 20px;
    color: white;
}

h1 {
    margin-bottom: 40px;
    font-weight: 700;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    max-width: 1000px;
    margin: auto;
}

.gallery img {
    width: 100%;
    border-radius: 20px;
    transition: 0.4s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.gallery img:hover {
    transform: scale(1.07);
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 35px;
    border-radius: 30px;
    background: white;
    color: #ff4e9b;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s ease;
}

.btn:hover {
    background: black;
    color: white;
}
</style>
</head>

<body>

<h1>Pink Gallery 💗</h1>

<div class="gallery">
    <img src="img.jpg" alt="Image 1">
    <img src="img1.jpg" alt="Image 2">
    <img src="img2.jpg" alt="Image 3">
    <img src="img3.jpg" alt="Image 4">
</div>

<a href="index.html" class="btn">←Messages</a>

</body>
</html>
